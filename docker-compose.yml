services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dass
      POSTGRES_USER: dass
      POSTGRES_PASSWORD: dass
    ports:
      - "5432:5432"
    volumes:
      - dass-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-primary:/docker-entrypoint-initdb.d # 把腳本資料夾對應到 Docker 內部的初始化目錄
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dass -d dass"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: postgres

  postgres-replica:
    image: postgres:16-alpine
    # 🌟 關鍵：不用官方的開機流程，改用我們寫的影子腳本開機
    entrypoint: ["/init-script/entrypoint-replica.sh"]
    environment:
      POSTGRES_DB: dass
      POSTGRES_USER: dass
      POSTGRES_PASSWORD: dass
    volumes:
      # 掛載副本自己的永久硬碟
      - dass-replica-data:/var/lib/postgresql/data
      # 把 entrypoint 腳本資料夾掛載進去
      - ./infra/postgres/init-replica:/init-script
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: postgres-replica

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs
      DEBUG: "0"
      PERSISTENCE: "1"
    ports:
      - "4566:4566"
    volumes:
      - ./infra/localstack/init:/etc/localstack/init/ready.d
      - dass-localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4566/_localstack/health | grep -qE '\"sqs\":\\s*\"(running|available)\"'"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: localstack

  api-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      DASS_DATABASE_URL: ${DASS_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres:5432/dass}
      DASS_REPLICA_DATABASE_URL: ${DASS_REPLICA_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres-replica:5432/dass}
      DASS_SQS_ENDPOINT_URL: ${DASS_SQS_ENDPOINT_URL:-http://localstack:4566}
      DASS_WORKER_ID: ${DASS_WORKER_ID:-api-server}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: api-server

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    env_file:
      - .env
    environment:
      DASS_DATABASE_URL: ${DASS_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres:5432/dass}
      DASS_REPLICA_DATABASE_URL: ${DASS_REPLICA_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres-replica:5432/dass}
      DASS_SQS_ENDPOINT_URL: ${DASS_SQS_ENDPOINT_URL:-http://localstack:4566}
      DASS_WORKER_ID: ${DASS_WORKER_ID:-scheduler}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: scheduler

  autoscaler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    command: ["python", "-m", "app.cli", "autoscaler"]
    env_file:
      - .env
    environment:
      DASS_DATABASE_URL: ${DASS_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres:5432/dass}
      DASS_REPLICA_DATABASE_URL: ${DASS_REPLICA_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres-replica:5432/dass}
      DASS_SQS_ENDPOINT_URL: ${DASS_SQS_ENDPOINT_URL:-http://localstack:4566}
      DASS_WORKER_ID: ${DASS_WORKER_ID:-autoscaler}
    # S5: VMService spawns sibling worker containers via host docker daemon.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: autoscaler

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      DASS_DATABASE_URL: ${DASS_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres:5432/dass}
      DASS_REPLICA_DATABASE_URL: ${DASS_REPLICA_DATABASE_URL:-postgresql+psycopg://dass:dass@postgres-replica:5432/dass}
      DASS_SQS_ENDPOINT_URL: ${DASS_SQS_ENDPOINT_URL:-http://localstack:4566}
      DASS_WORKER_ID: ${DASS_WORKER_ID:-worker}
    # S4: worker 透過 host docker daemon 起 job container；需要把 docker.sock mount 進來。
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        DASS_BACKEND_URL: ${DASS_BACKEND_URL:-http://api-server:8000}
    ports:
      - "3000:3000"
    depends_on:
      api-server:
        condition: service_started
    restart: unless-stopped
    networks:
      - dass-net
    labels:
      com.dass.project: dass
      com.dass.service: frontend

volumes:
  dass-postgres-data:
  dass-replica-data:      # 副本的硬碟
  dass-localstack-data:

networks:
  dass-net:
    driver: bridge
