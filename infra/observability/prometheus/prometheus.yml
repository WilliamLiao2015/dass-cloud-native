global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: sqs
    static_configs:
      - targets: ['sqs-exporter:9100']
