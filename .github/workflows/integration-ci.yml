# ============================================================
# integration-ci.yml — integration tests (Sprint 4)
# ============================================================
# Runs cross-module tests in real Docker (PostgreSQL + LocalStack SQS).
# Triggers: every PR — except changes touching only docs / editor config.
# PR-only workflow: main is updated only via merged PRs, so no push trigger.
# Runs in parallel with backend-ci.yml.
# xfail strategy: S4 tests start as XFAIL; XFAIL → XPASS as feature PRs land.
# ============================================================

name: Integration Tests

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "snippets/**"
      - "LICENSE*"
      - ".gitignore"
      - ".editorconfig"
      - ".actignore"
      - ".actrc"
      - ".vscode/**"
  workflow_dispatch:

concurrency:
  group: integration-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: "Integration Tests (Docker)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dass_test
          POSTGRES_USER: dass
          POSTGRES_PASSWORD: dass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dass -d dass_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres-scheduler:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dass_scheduler
          POSTGRES_USER: dass
          POSTGRES_PASSWORD: dass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dass -d dass_scheduler"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      localstack:
        image: localstack/localstack:3
        env:
          SERVICES: sqs
          DEBUG: "0"
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -fs http://localhost:4566/_localstack/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      DASS_DATABASE_URL: "postgresql+psycopg://dass:dass@localhost:5432/dass_test"
      DASS_SCHEDULER_DB_URL: "postgresql+psycopg://dass:dass@localhost:5433/dass_scheduler"
      DASS_DATABASE_REPLICA_URL: "postgresql+psycopg://dass:dass@localhost:5432/dass_test"
      DASS_SQS_ENDPOINT_URL: "http://localhost:4566"
      DASS_QUEUE_NAME: "dass-tasks"
      DASS_QUEUE_NAME_NORMAL: "dass-tasks-normal"
      DASS_QUEUE_NAME_SCHEDULED: "dass-tasks-scheduled"
      DASS_QUEUE_NAME_RETRY: "dass-tasks-retry"
      DASS_QUEUE_BACKEND: "sqs"
      DASS_AWS_REGION: "us-east-1"
      DASS_AWS_ACCESS_KEY_ID: "test"
      DASS_AWS_SECRET_ACCESS_KEY: "test"
      DASS_WORKER_ID: "ci-worker"
      DASS_ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Wait for LocalStack SQS
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:4566/_localstack/health | grep -qE '"sqs":\s*"(running|available)"'; then
              echo "SQS is ready"
              break
            fi
            echo "Waiting for SQS... ($i/30)"
            sleep 2
          done

      - name: Create SQS queues
        run: |
          # Use awslocal inside the LocalStack service container so the step works
          # on both real GitHub Actions runners and slim `act` images that lack awscli.
          LOCALSTACK_CID=$(docker ps --filter "ancestor=localstack/localstack:3" --format "{{.ID}}" | head -1)
          if [ -z "$LOCALSTACK_CID" ]; then
            echo "LocalStack service container not found" >&2
            docker ps >&2
            exit 1
          fi
          for q in dass-tasks dass-tasks-normal dass-tasks-scheduled dass-tasks-retry; do
            docker exec "$LOCALSTACK_CID" awslocal sqs create-queue --queue-name "$q"
          done
          echo "SQS queues created"

      - name: Run DB migrations (Main DB)
        run: uv run alembic upgrade head

      - name: Run DB migrations (Scheduler DB)
        run: uv run alembic upgrade head
        env:
          DASS_DATABASE_URL: "postgresql+psycopg://dass:dass@localhost:5433/dass_scheduler"

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            -m integration \
            -v --tb=long \
            --override-ini="addopts=" \
            2>&1 | tee integration-results.txt

      - name: Integration summary
        if: always()
        run: |
          # grep -c prints "0" AND exits 1 on no-match, so `|| echo 0` would
          # produce "0\n0" and break markdown rendering. Use `|| true` instead.
          PASSED=$(grep -c " PASSED" integration-results.txt 2>/dev/null || true)
          FAILED=$(grep -c " FAILED" integration-results.txt 2>/dev/null || true)
          ERRORS=$(grep -c " ERROR" integration-results.txt 2>/dev/null || true)

          {
            echo "## Integration Test Summary"
            echo ""
            echo "| Status | Count |"
            echo "|--------|-------|"
            echo "| Passed | ${PASSED:-0} |"
            echo "| Failed | ${FAILED:-0} |"
            echo "| Error  | ${ERRORS:-0} |"
          } >> "$GITHUB_STEP_SUMMARY"
